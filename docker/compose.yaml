name: annabell

services:
  app:
    image: dataset:${ANNABELL_VERSION}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: final
      args:
        - ANNABELL_VERSION=${ANNABELL_VERSION}
    volumes:
      - ./shared_data:/app/shared_data:rw
    stdin_open: true
    tty: true
